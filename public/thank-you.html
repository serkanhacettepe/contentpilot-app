<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You - ContentPilot</title>`r`n  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #070711;
      --card: #111126;
      --border: rgba(255,255,255,0.08);
      --accent: #6366f1;
      --accent2: #22d3ee;
      --text: #eef2ff;
      --muted: #94a3b8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top left, rgba(99,102,241,0.18), transparent 35%),
        radial-gradient(circle at bottom right, rgba(34,211,238,0.12), transparent 30%),
        var(--bg);
      color: var(--text);
      font-family: "Outfit", sans-serif;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 720px;
      background: rgba(17,17,38,0.9);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 32px;
      text-align: center;
      box-shadow: 0 20px 80px rgba(0,0,0,0.35);
    }

    .icon {
      width: 72px;
      height: 72px;
      margin: 0 auto 24px;
      border-radius: 20px;
      display: grid;
      place-items: center;
      font-size: 30px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3.4rem);
      line-height: 1.05;
      margin-bottom: 16px;
      letter-spacing: -1px;
    }

    p {
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.7;
      max-width: 560px;
      margin: 0 auto 28px;
    }

    .actions {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 22px;
      border-radius: 999px;
      font-weight: 700;
      text-decoration: none;
      transition: 0.25s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #7c3aed);
      color: white;
    }

    .btn-secondary {
      border: 1px solid var(--border);
      color: var(--text);
      background: rgba(255,255,255,0.03);
    }

    .btn:hover {
      transform: translateY(-2px);
    }
  </style>
<!-- Google tag (gtag.js) -->

</head>
<body>
  <div class="card">
    <div class="icon">✓</div>
    <h1>You’re on the waitlist</h1>
    <p>
      Thanks for joining ContentPilot. Your payment was received successfully.
      Early access is activated manually within 30 minutes. In the meantime, you can explore the live app and we’ll email you as soon as your access is ready.
    </p>
    <div class="actions">
      <a class="btn btn-primary" href="/app">Try the App</a>
      <a class="btn btn-secondary" href="/landing.html">Back to Landing Page</a>
    </div>
  </div>
</body>
</html>
